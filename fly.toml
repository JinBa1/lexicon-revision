app = "lexicon-revision-api"
primary_region = "lhr"

[env]
  APP_ENV = "prod"
  ENABLE_DEV_ROUTES = "false"
  INGEST_QUEUE_PROVIDER = "sqs"
  AWS_REGION = "eu-west-2"
  ACCESS_AUTH_PROVIDER = "clerk"
  CLERK_AUTHORIZED_PARTIES = "https://lexiconrevision.uk"
  CORS_ALLOWED_ORIGINS = "https://lexiconrevision.uk"
  EMBEDDING_PROVIDER = "voyage"
  EMBEDDING_MODEL = "voyage-4-lite"
  EMBEDDING_MODEL_ID = "voyage-4-lite"
  EMBEDDING_DIMENSION = "1024"
  EMBEDDING_OUTPUT_DIMENSION = "1024"
  RERANK_ENABLED = "true"
  RERANK_PROVIDER = "voyage"
  RERANK_MODEL = "rerank-2.5-lite"
  OBJECT_STORAGE_PROVIDER = "s3"
  OBJECT_STORAGE_BUCKET = "lexicon-revision-prod"
  OBJECT_STORAGE_REGION = "auto"
  PLANNING__PROVIDER = "openai_compatible"
  PLANNING__BASE_URL = "https://api.openai.com/v1"
  PLANNING__MODEL = "gpt-4o-mini"
  GENERATION__PROVIDER = "openai_compatible"
  GENERATION__BASE_URL = "https://api.openai.com/v1"
  GENERATION__MODEL = "gpt-4o-mini"
  RATE_LIMIT_SEARCH_USER = "60/hour"
  RATE_LIMIT_SEARCH_ANON = "20/hour"
  RATE_LIMIT_STUDY_USER = "20/day"
  RATE_LIMIT_STUDY_ANON = "3/day"

[build]
  build-target = "prod"

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/healthz"
    timeout = "5s"

  [[http_service.checks]]
    grace_period = "45s"
    interval = "20s"
    method = "get"
    path = "/readyz"
    timeout = "5s"

[vm]
  memory = "1024mb"
  cpu_kind = "shared"
  cpus = 1
