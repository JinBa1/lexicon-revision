default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        entry: bash -lc 'cd frontend && corepack pnpm lint'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx)$
        stages: [pre-commit]

      - id: frontend-prettier-check
        name: frontend prettier check
        entry: bash -lc 'cd frontend && corepack pnpm format:check'
        language: system
        pass_filenames: false
        files: ^frontend/src/.*\.(ts|tsx|css)$
        stages: [pre-commit]

      - id: frontend-test
        name: frontend test
        entry: bash -lc 'cd frontend && corepack pnpm test'
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-push]

      - id: frontend-build
        name: frontend build
        entry: bash -lc 'cd frontend && corepack pnpm build'
        language: system
        pass_filenames: false
        files: ^frontend/
        stages: [pre-push]
