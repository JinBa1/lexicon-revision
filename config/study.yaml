generation:
  provider: ollama
  model: qwen2.5:7b-instruct
  temperature: 0.1
  base_url: http://localhost:11434
  request_timeout_seconds: 60
  max_provider_retries: 1
  total_generation_deadline_seconds: 75
  schema_repair_retries: 1

context:
  retrieval_top_k_default: 15
  budget_tokens: 4000
  max_single_chunk_tokens: 1200

# NOTE: this pin is the runtime source of truth and overrides the code default
# (PromptSettings -> study_aid_v3 in src/study/config.py). It is intentionally
# still v1: study_aid_v3 is what consumes the planner's `generation_guidance`,
# but flipping it changes live generation behaviour and must be re-validated on
# its own (re-run the Tier-3 study eval with v3 before activating). Until then
# generation_guidance is plumbed end-to-end but inert. See PR #38 follow-up.
prompt:
  version: study_aid_v1
  path: prompts/study_aid_v1.yaml
