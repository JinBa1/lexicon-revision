generation:
  provider: ollama
  model: qwen2.5:7b-instruct
  temperature: 0.1
  base_url: http://localhost:11434
  request_timeout_seconds: 60
  max_provider_retries: 1
  total_generation_deadline_seconds: 75
  schema_repair_retries: 1

context:
  retrieval_top_k_default: 15
  budget_tokens: 4000
  max_single_chunk_tokens: 1200

# Runtime study prompt. study_aid_v3 consumes the planner's
# `generation_guidance` and the rewritten retrieval query; matches the
# PromptSettings default in src/study/config.py. study_aid_v1 is the prior
# production prompt, retained as the rollback target (set version+path back to
# v1 to disable guidance). Changing this changes live generation behaviour —
# re-run the Tier-3 study eval on the new prompt before shipping.
prompt:
  version: study_aid_v3
  path: prompts/study_aid_v3.yaml
