[tool.ruff]
target-version = "py312"
line-length = 88
src = ["src", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = ["."]
markers = [
    "integration: tests requiring external services (e.g. Postgres via TEST_DATABASE_URL); skipped automatically when the service is unavailable",
]
