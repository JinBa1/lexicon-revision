services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - NVIDIA_VISIBLE_DEVICES=all   # for CUDA later
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    user: "${UID:-1000}:${GID:-1000}"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      # Host PG 14 (5432) and PG 16 (5433) occupy standard ports.
      # Revert to 5432:5432 when those are stopped/disabled.
      - "5434:5432"
    environment:
      POSTGRES_DB: rag_exam
      POSTGRES_USER: rag_exam
      POSTGRES_PASSWORD: rag_exam
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  chroma_data:
  postgres_data:
