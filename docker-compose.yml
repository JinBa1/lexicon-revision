services:
  backend:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - NVIDIA_VISIBLE_DEVICES=all   # for CUDA later
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    user: "${UID:-1000}:${GID:-1000}"

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      # Host PG 14 (5432) and PG 16 (5433) occupy standard ports.
      # Revert to 5432:5432 when those are stopped/disabled.
      - "5434:5432"
    environment:
      POSTGRES_DB: rag_exam
      POSTGRES_USER: rag_exam
      POSTGRES_PASSWORD: rag_exam
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
